<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Gestor de Compras</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>🛒 Minha Lista</h1>


    <div class="budget-section">
        <label>Limite de Gasto (R$):</label>
        <input type="number" id="budget" placeholder="Ex: 500.00" step="0.01">
    </div>

    <div class="input-section">
        <input type="text" id="itemName" placeholder="Produto (Ex: Feijão)">

        <div class="row">
            <input type="number" id="itemQuantity" value="1" min="1" placeholder="Qtd">
            <input type="number" id="itemPrice" placeholder="Preço Unitário R$" step="0.01">
        </div>

        <button onclick="addItem()">Adicionar Item</button>
    </div>

    <div class="summary">
        <p>Total Gasto: <span id="totalSpent">R$ 0,00</span></p>
        <p>Saldo Restante: <span id="remainingBalance">R$ 0,00</span></p>
    </div>
    <p class="developer">Desenvolvido por Marciel</p>
    <ul id="itemList"></ul>
</div>

<script src="script.js"></script>

</body>
</html>
